<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamere</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 10px;
        }
        .camera-block {
            margin-bottom: 80px; /* razmak između kamera */
        }
        .camera-block h2 {
            margin: 10px 0;
        }
        img {
            width: 100%;        /* automatski prati širinu ekrana */
            max-width: 400px;   /* maksimalna širina za desktop */
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .iframe-wrapper {
            width: 300px;
            height: 127px;      /* vidljivi dio */
            overflow: hidden;   /* uklanja scroll */
            margin: 2px auto;
        }
        .iframe-wrapper iframe {
            width: 300px;
            height: 127px;      /* stvarna visina iframe-a */
            border: none;
            position: relative;
            top: -40px;         /* pomak za crop */
        }
    </style>
</head>
<body>

<script>
    function refreshSnapshot(imgId) {
        const img = document.getElementById(imgId);
        if (!img) return;
        const baseUrl = img.src.split('?')[0];
        img.src = baseUrl + '?_t=' + new Date().getTime();
    }

    const imgIds = ['img1','img2','img4','img5','img6'];

    imgIds.forEach(id => {
        setInterval(() => {
            refreshSnapshot(id);
        }, 30000); // osvježavanje svakih 30 sekundi
    });
</script>
